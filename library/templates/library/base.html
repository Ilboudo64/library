<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Bibliothèque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* Styles pour correspondre à votre design Sidebar sombre */
        .sidebar { background-color: #1e293b; min-height: 100vh; color: white; }
        .nav-link { color: #94a3b8; margin-bottom: 5px; }
        .nav-link:hover { color: white; background-color: #334155; border-radius: 8px; }
        .nav-link.active { background-color: #334155; color: white; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar vh-100 p-3 shadow">
                <h3 class="py-3 text-center border-bottom border-secondary mb-4">Bibliothèque</h3>
                
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'book_list' %}active{% endif %}" href="{% url 'book_list' %}">
                            <i class="bi bi-book me-2"></i> Catalogue
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'reader_list' %}active{% endif %}" href="{% url 'reader_list' %}">
                            <i class="bi bi-people me-2"></i> Lecteurs
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'reservation_list' %}active{% endif %}" href="{% url 'reservation_list' %}">
                            <i class="bi bi-calendar-event me-2"></i> Réservations
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-10 bg-light p-4 overflow-auto" style="height: 100vh;">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
